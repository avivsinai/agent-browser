version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    assignees:
      - "avivsinai"
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/benchmarks"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    assignees:
      - "avivsinai"
    groups:
      npm-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
      semver-major-days: 14

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
